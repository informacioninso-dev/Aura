server {
    listen 80;
    server_name aura.binnso.com;
    # Certbot redirige automáticamente a HTTPS después de instalar el certificado
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name aura.binnso.com;

    # Certbot completa estas rutas al ejecutar certbot --nginx
    ssl_certificate /etc/letsencrypt/live/aura.binnso.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aura.binnso.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Archivos estáticos de React (build de Vite)
    root /var/www/aura/front;
    index index.html;

    # API → Gunicorn (Django)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin de Django
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Archivos estáticos de Django (collectstatic)
    location /static/ {
        alias /var/www/aura/back/staticfiles/;
    }

    # Archivos de media (uploads)
    location /media/ {
        alias /var/www/aura/back/media/;
    }

    # SPA: todo lo demás sirve index.html (React Router lo maneja)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Seguridad
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
